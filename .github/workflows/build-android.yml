name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk RevenuivaAI-Register-v1.1.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0-android
          name: RevenuivaAI Register v1.1.0 (Android) - NFC UX Fix
          body: |
            RevenuivaAI Register v1.1.0 - NFC UX Polish

            Fixes:
            - Eliminated screen blinking/flickering during NFC collection
            - Step-by-step status messages during payment flow
            - Error messages persist until manually dismissed
            - Processing lock prevents polling interference
            - Smooth animations and transitions
            - Extended success display with fade-out
            - Confirmation dialog before cancelling active NFC
          files: RevenuivaAI-Register-v1.1.0.apk
          make_latest: true
