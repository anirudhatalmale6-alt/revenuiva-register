name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx4g -XX:+UseParallelGC
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk RevenuivaAI-Register-v2.0.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-android
          name: RevenuivaAI Register v2.0.0 (Android) - Multi-Provider
          body: |
            RevenuivaAI Register v2.0.0 - Multi-Provider Payment Support

            - Square Mobile Payments SDK integration (NFC Tap to Pay)
            - Auto-detects active payment provider from dashboard settings
            - Stripe and Square both fully supported for NFC
            - RevenuivaAI logo on login screen
            - Show/hide password toggle
            - Persistent error screens
          files: RevenuivaAI-Register-v2.0.0.apk
          make_latest: true
